# .github/workflows/engagement-harness.yml
# Generated by engagement-harness ci templates --platform github
name: Engagement Harness Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    name: PR Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.33.2

      - name: Verify HARNESS_PAT is set
        env:
          TOKEN: ${{ secrets.HARNESS_PAT }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "HARNESS_PAT secret is not set"
            echo "Add it at: repo/settings/secrets/actions"
            exit 1
          fi
          echo "HARNESS_PAT found"

      - name: Clone Engagement Harness
        env:
          TOKEN: ${{ secrets.HARNESS_PAT }}
        run: |
          git clone --depth 1 \
            https://x-access-token:${TOKEN}@github.com/praxent/harness-review.git \
            /tmp/harness-review

      - name: Build Engagement Harness
        run: |
          cd /tmp/harness-review
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install CLI
        run: |
          printf '#!/bin/sh\nexec node /tmp/harness-review/packages/cli/dist/bin/engagement-harness.js "$@"\n' | sudo tee /usr/local/bin/engagement-harness
          sudo chmod +x /usr/local/bin/engagement-harness

      - name: Restore findings cache
        uses: actions/cache@v4
        with:
          path: .engagement-harness/findings/
          key: known-findings-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            known-findings-pr-${{ github.event.pull_request.number }}

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
        run: engagement-harness review --ci

      - name: Save findings cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .engagement-harness/findings/
          key: known-findings-pr-${{ github.event.pull_request.number }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: engagement-harness-reports
          path: .engagement-harness/reports/
